<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#fcfcfa"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#245aa6"/>

  <!-- Name -->
  <text x="80" y="260" font-family="system-ui, -apple-system, Helvetica Neue, Arial, sans-serif"
        font-size="72" font-weight="700" fill="#1a1a16" letter-spacing="-2">
    Mohak Tripathi
  </text>

  <!-- Tagline -->
  <text x="80" y="340" font-family="Charter, Cambria, Georgia, serif"
        font-size="36" fill="#6b6a60">
    Backend engineer · solo founder · writing about
  </text>
  <text x="80" y="390" font-family="Charter, Cambria, Georgia, serif"
        font-size="36" fill="#6b6a60">
    systems, databases, and building in public.
  </text>

  <!-- URL -->
  <text x="80" y="540" font-family="system-ui, -apple-system, Helvetica Neue, Arial, sans-serif"
        font-size="28" fill="#245aa6" letter-spacing="0">
    mohaktripathi.com
  </text>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e6e5dd" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect x="800" y="0" width="400" height="630" fill="url(#grid)" opacity="0.5"/>
</svg>
